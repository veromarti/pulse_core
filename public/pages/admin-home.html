<div class="container mt-4">
  <div class="row">
    <div class="col-12">
      <h2 class="mb-4">Admin Dashboard</h2>
    </div>
  </div>

  <div class="row">

    <!-- Create Campaign -->
    <div class="col-lg-6 col-md-12 mb-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Create Campaign</h5>
          <form id="campaign-form">
            <div class="mb-3">
              <label for="title">Campaign Title</label>
              <input
                type="text"
                class="form-control"
                placeholder="Title"
                id="title"
                required
                name="title"
              />
            </div>
            <div class="mb-3">
              <label for="city">City</label>
              <select id="city" class="form-select" name="city">
                <option selected disabled>Choose an option</option>
                <option value="bello">BELLO</option>
                <option value="envigado">ENVIGADO</option>
                <option value="itagui">ITAGUI</option>
                <option value="medellin">MEDELLIN</option>
                <option value="sabaneta">SABANETA</option>
                <option value="bogota">BOGOTA</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="start-date">Start date</label>
              <input id="start-date" type="date" name="start-date" />
            </div>

            <div class="mb-3">
              <label for="end-date">End date</label>
              <input id="end-date" type="date" name="end-date" />
            </div>

            <button type="submit" class="btn btn-danger w-100">Create Campaign</button>
          </form>
        </div>
      </div>
    </div>

    <div class="container">
      <h4 class="card-title text-center mb-2">Donation Campaigns</h4>
      <table class="table table-stripped">
        <thead>
          <tr>
            <th scope="col">ID</th>
            <th scope="col">NAME</th>
            <th scope="col">CITY</th>
            <th scope="col">START DATE</th>
            <th scope="col">END DATE</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
